      <stop offset="45%"  stop-color="#a8d8ea"/>
      <stop offset="72%"  stop-color="#5098b8"/>
      <stop offset="100%" stop-color="#1a4860"/>
    </radialGradient>
    <radialGradient id="rim_minor" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5098b8"/>
      <stop offset="100%" stop-color="#0e2838"/>
    </radialGradient>
    <linearGradient id="bg_minor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#001520"/>
      <stop offset="100%" stop-color="#00080e"/>
    </linearGradient>
    <linearGradient id="frame_minor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#eef9ff"/>
      <stop offset="50%"  stop-color="#a8d8ea"/>
