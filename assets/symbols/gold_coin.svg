<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="coinFace" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff7a0"/>
      <stop offset="40%" stop-color="#d4af37"/>
      <stop offset="80%" stop-color="#b8930a"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>
    <radialGradient id="coinEdge" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="85%" stop-color="#d4af37"/>
      <stop offset="95%" stop-color="#f5d878"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>
    <linearGradient id="bgCoin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="goldFrameCoin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0a0"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5c00"/>
    </linearGradient>
    <filter id="coinGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="18" fill="url(#bgCoin)"/>
  <rect x="4" y="4" width="192" height="192" rx="15" fill="none" stroke="url(#goldFrameCoin)" stroke-width="3"/>
  <!-- BONUS label -->
  <text x="100" y="27" font-family="Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#e91e8c" letter-spacing="2">BONUS</text>
  <!-- Coin outer ring -->
  <circle cx="100" cy="108" r="75" fill="#8b6914" filter="url(#coinGlow)"/>
  <circle cx="100" cy="108" r="72" fill="url(#coinFace)"/>
  <!-- Coin inner ring decoration -->
  <circle cx="100" cy="108" r="65" fill="none" stroke="#8b6914" stroke-width="2"/>
  <circle cx="100" cy="108" r="60" fill="#c9a020" opacity="0.5"/>
  <!-- Silhouette of two sisters (simplified) -->
  <ellipse cx="88" cy="95" rx="12" ry="15" fill="#8b6914" opacity="0.7"/>
  <ellipse cx="112" cy="95" rx="12" ry="15" fill="#8b6914" opacity="0.7"/>
  <circle cx="88" cy="80" r="9" fill="#8b6914" opacity="0.7"/>
  <circle cx="112" cy="80" r="9" fill="#8b6914" opacity="0.7"/>
  <!-- BIG MUNNY text on coin -->
  <text x="100" y="122" font-family="Georgia,serif" font-size="12" font-weight="900" text-anchor="middle" fill="#1a0d2e" letter-spacing="1">BIG MUNNY</text>
  <!-- Coin shine -->
  <ellipse cx="80" cy="90" rx="22" ry="14" fill="#fff7a0" opacity="0.25" transform="rotate(-30,80,90)"/>
  <!-- Edge notches for realism -->
  <circle cx="100" cy="36" r="3" fill="#d4af37"/>
  <circle cx="100" cy="180" r="3" fill="#d4af37"/>
  <circle cx="28" cy="108" r="3" fill="#d4af37"/>
  <circle cx="172" cy="108" r="3" fill="#d4af37"/>
</svg>
