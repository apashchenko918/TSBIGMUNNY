      <stop offset="45%"  stop-color="#c9f0a0"/>
      <stop offset="72%"  stop-color="#60b030"/>
      <stop offset="100%" stop-color="#1e4a00"/>
    </radialGradient>
    <radialGradient id="rim_major" cx="50%" cy="50%" r="50%">
