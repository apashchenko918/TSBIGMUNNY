<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="cherry1" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ff8080"/>
      <stop offset="50%" stop-color="#cc0020"/>
      <stop offset="100%" stop-color="#7a0010"/>
    </radialGradient>
    <radialGradient id="cherry2" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ff8080"/>
      <stop offset="50%" stop-color="#cc0020"/>
      <stop offset="100%" stop-color="#7a0010"/>
    </radialGradient>
    <linearGradient id="stemG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d7a00"/>
      <stop offset="100%" stop-color="#6ab800"/>
    </linearGradient>
    <linearGradient id="bgCherry" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="goldFrameC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0a0"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5c00"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="18" fill="url(#bgCherry)"/>
  <rect x="4" y="4" width="192" height="192" rx="15" fill="none" stroke="url(#goldFrameC)" stroke-width="3"/>
  <!-- Stems -->
  <path d="M 70 140 Q 80 80 100 60 Q 120 80 130 140" fill="none" stroke="url(#stemG)" stroke-width="5" stroke-linecap="round"/>
  <!-- Leaf -->
  <ellipse cx="100" cy="62" rx="14" ry="8" fill="#4a9200" transform="rotate(-20,100,62)"/>
  <ellipse cx="100" cy="62" rx="14" ry="8" fill="none" stroke="#3d7a00" stroke-width="1" transform="rotate(-20,100,62)"/>
  <!-- Left cherry -->
  <circle cx="65" cy="152" r="32" fill="url(#cherry1)"/>
  <circle cx="57" cy="142" r="9" fill="#ff9090" opacity="0.5"/>
  <circle cx="65" cy="152" r="32" fill="none" stroke="#7a0010" stroke-width="2"/>
  <!-- Right cherry -->
  <circle cx="135" cy="152" r="32" fill="url(#cherry2)"/>
  <circle cx="127" cy="142" r="9" fill="#ff9090" opacity="0.5"/>
  <circle cx="135" cy="152" r="32" fill="none" stroke="#7a0010" stroke-width="2"/>
  <!-- Gold sparkles -->
  <circle cx="30" cy="30" r="3" fill="#d4af37" opacity="0.8"/>
  <circle cx="170" cy="28" r="3" fill="#d4af37" opacity="0.8"/>
  <line x1="30" y1="23" x2="30" y2="37" stroke="#d4af37" stroke-width="1.5" opacity="0.7"/>
  <line x1="23" y1="30" x2="37" y2="30" stroke="#d4af37" stroke-width="1.5" opacity="0.7"/>
</svg>
