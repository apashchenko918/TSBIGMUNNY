  <circle cx="100" cy="100" r="86" fill="#ff6b35" opacity="0.15" filter="url(#glow_grand)"/>
  <circle cx="100" cy="100" r="77" fill="url(#rim_grand)"/>

  <g stroke="#ff8050" stroke-width="2.2" opacity="0.55">
