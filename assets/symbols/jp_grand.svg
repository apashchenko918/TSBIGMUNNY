  <line x1="62" y1="119" x2="138" y2="119" stroke="#ff6b35" stroke-width="1.2" opacity="0.6"/>

  <g opacity="0.85"><circle cx="20" cy="20" r="3" fill="#ff9060"/>
    <line x1="20" y1="13" x2="20" y2="27" stroke="#ff9060" stroke-width="1.4"/>
    <line x1="13" y1="20" x2="27" y2="20" stroke="#ff9060" stroke-width="1.4"/>
  </g>
  <g opacity="0.65"><circle cx="180" cy="20" r="2.2" fill="#ff9060"/>
