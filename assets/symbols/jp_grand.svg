    <line x1="100" y1="24" x2="100" y2="30" transform="rotate(126,100,100)"/>
    <line x1="100" y1="24" x2="100" y2="30" transform="rotate(144,100,100)"/>
    <line x1="100" y1="24" x2="100" y2="30" transform="rotate(162,100,100)"/>
