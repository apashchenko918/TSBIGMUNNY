    <line x1="100" y1="24" x2="100" y2="30" transform="rotate(252,100,100)"/>
    <line x1="100" y1="24" x2="100" y2="30" transform="rotate(270,100,100)"/>
    <line x1="100" y1="24" x2="100" y2="30" transform="rotate(288,100,100)"/>
