    <circle cx="-9"  cy="1"  r="2.2" fill="#ff6b35" stroke="#ffe0c0" stroke-width="0.8"/>
    <circle cx="9"   cy="1"  r="2.2" fill="#ff6b35" stroke="#ffe0c0" stroke-width="0.8"/>
    <circle cx="0"   cy="-6" r="1.3" fill="#ffe0c0" opacity="0.85"/>
  </g>

  <circle cx="100" cy="100" r="72" fill="url(#shine_grand)"/>

  <text x="100" y="112" font-family="'Cinzel',Georgia,serif" font-size="22" font-weight="900"
