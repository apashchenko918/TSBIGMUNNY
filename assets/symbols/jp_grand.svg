<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="face_grand" cx="36%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#fff0e0"/>
      <stop offset="15%"  stop-color="#ffa070"/>
      <stop offset="40%"  stop-color="#ff6b35"/>
      <stop offset="70%"  stop-color="#c03010"/>
      <stop offset="100%" stop-color="#600808"/>
    </radialGradient>
    <radialGradient id="rim_grand" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c03010"/>
      <stop offset="100%" stop-color="#380800"/>
    </radialGradient>
    <linearGradient id="bg_grand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#180400"/>
      <stop offset="100%" stop-color="#080100"/>
    </linearGradient>
    <linearGradient id="frame_grand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffe0c0"/>
      <stop offset="50%"  stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#600808"/>
    </linearGradient>
    <linearGradient id="label_grand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#ff9060"/>
      <stop offset="100%" stop-color="#600808"/>
    </linearGradient>
    <radialGradient id="shine_grand" cx="32%" cy="26%" r="48%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow_grand" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tglow_grand">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" rx="18" fill="url(#bg_grand)"/>
